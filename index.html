<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokerLeague Pro - Tournament Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #06090e;
            --card-bg: rgba(13, 20, 30, 0.75);
            --border-color: rgba(255, 215, 0, 0.15);
            --primary-gold: #ffd700;
            --primary-gold-glow: rgba(255, 215, 0, 0.4);
            --text-main: #f0f4f8;
            --text-muted: #6c7a89;
            --neon-blue: #00f2fe;
            --neon-red: #ff0844;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            /* 霓虹背景光效 */
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 242, 254, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 8, 68, 0.05) 0%, transparent 40%);
        }

        /* 顶部导航与赛事标签 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(6, 9, 14, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
        }

        .logo-zone {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            color: var(--primary-gold);
            font-size: 24px;
            font-weight: 900;
            text-shadow: 0 0 10px var(--primary-gold-glow);
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #fff 0%, var(--primary-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-tabs {
            display: flex;
            gap: 8px;
        }

        .tab-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.05);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab-btn.active, .tab-btn:hover {
            border-color: var(--primary-gold);
            color: var(--primary-gold);
            background: rgba(255, 215, 0, 0.05);
            text-shadow: 0 0 8px var(--primary-gold-glow);
        }

        /* 核心三栏式大屏布局 */
        main {
            flex: 1;
            display: grid;
            grid-template-columns: 320px 1fr 350px;
            gap: 20px;
            padding: 20px;
            height: calc(100vh - 70px);
        }

        /* 通用面板样式 */
        .panel {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .panel-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 14px;
            background: var(--primary-gold);
            border-radius: 2px;
            box-shadow: 0 0 8px var(--primary-gold);
        }

        /* 左侧栏：盲注级别列表 */
        .level-list {
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 5px;
        }

        .level-item {
            display: grid;
            grid-template-columns: 40px 1fr 60px;
            align-items: center;
            padding: 12px 15px;
            background: rgba(255,255,255,0.02);
            border-radius: 8px;
            border: 1px solid transparent;
            transition: all 0.3s;
        }

        .level-item.active {
            background: rgba(255, 215, 0, 0.08);
            border-color: rgba(255, 215, 0, 0.3);
        }

        .level-item.active .lvl-num { color: var(--primary-gold); }
        .level-item.active .lvl-blinds { color: #fff; font-weight: 700; }

        .lvl-num { font-size: 13px; color: var(--text-muted); font-weight: bold; }
        .lvl-blinds { font-size: 16px; color: #cbd5e1; }
        .lvl-time { font-size: 13px; color: var(--text-muted); text-align: right; }

        /* 中间核心：超大计时器与当前盲注 */
        .center-content {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 20px;
        }

        .main-display-card {
            flex: 1;
            background: radial-gradient(circle at 50% 40%, rgba(255,215,0,0.03) 0%, transparent 70%), var(--card-bg);
            border: 1px solid rgba(255, 215, 0, 0.1);
            position: relative;
        }

        /* 盲注信息横排 */
        .blinds-banner {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.02);
        }

        .blind-block {
            text-align: center;
        }

        .blind-block label {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1px;
            display: block;
            margin-bottom: 5px;
        }

        .blind-block .value {
            font-size: 36px;
            font-weight: 800;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
        }

        .blind-block .value.current {
            color: var(--primary-gold);
            text-shadow: 0 0 15px rgba(255,215,0,0.3);
        }

        /* 绝对的核心：超大倒计时 */
        .timer-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #timer {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(80px, 10vw, 150px);
            font-weight: 900;
            color: #fff;
            line-height: 1;
            letter-spacing: 2px;
            text-shadow: 0 0 30px rgba(255,255,255,0.1);
            cursor: pointer;
            transition: transform 0.2s;
        }

        #timer:active {
            transform: scale(0.98);
        }

        /* 极其内敛高级的控制按钮组（悬浮或底栏感） */
        .ctrl-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }

        .ctrl-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            color: #fff;
            padding: 12px 28px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ctrl-btn:hover {
            background: rgba(255,255,255,0.08);
            border-color: #fff;
        }

        .ctrl-btn.primary {
            background: var(--primary-gold);
            color: #000;
            border: none;
            box-shadow: 0 0 20px rgba(255,215,0,0.3);
        }

        .ctrl-btn.primary:hover {
            background: #ffe240;
            box-shadow: 0 0 25px rgba(255,215,0,0.5);
        }

        /* 右侧栏：专业数据看板组 */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            flex: 1;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255,255,255,0.02);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .stat-card::after {
            content: '♠';
            position: absolute;
            right: 15px;
            bottom: -10px;
            font-size: 70px;
            color: rgba(255,255,255,0.01);
            font-family: serif;
            pointer-events: none;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: #fff;
        }

        .stat-value.gold { color: var(--primary-gold); }
        .stat-value.blue { color: var(--neon-blue); }

        .stat-controls {
            display: flex;
            gap: 5px;
            margin-top: 8px;
        }

        .sub-btn {
            background: rgba(255,255,255,0.05);
            border: none;
            color: var(--text-main);
            width: 28px;
            height: 24px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .sub-btn:hover { background: rgba(255,255,255,0.15); }

        /* 隐藏滚动条 */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
    </style>
</head>
<body>

    <header>
        <div class="logo-zone">
            <span class="logo-icon">♠</span>
            <span class="logo-text">POKERLEAGUE PRO</span>
        </div>
        <div class="nav-tabs">
            <button class="tab-btn active">赛事大屏</button>
            <button class="tab-btn">盲注设置</button>
            <button class="tab-btn">奖金分配</button>
        </div>
    </header>

    <main>
        <section class="panel">
            <h2 class="panel-title">盲注级别结构</h2>
            <div class="level-list" id="levelList">
                </div>
        </section>

        <section class="center-content">
            <div class="panel main-display-card">
                <div class="blinds-banner">
                    <div class="blind-block">
                        <label>当前盲注 Level <span id="currentLevelNum">1</span></label>
                        <div class="value current" id="currentBlindsDisplay">100 / 200</div>
                    </div>
                    <div class="blind-block">
                        <label>前注 (Ante)</label>
                        <div class="value" id="currentAnteDisplay">200</div>
                    </div>
                    <div class="blind-block">
                        <label>下一级别</label>
                        <div class="value" style="color: var(--text-muted); font-size: 24px; margin-top: 10px;" id="nextBlindsDisplay">200 / 400</div>
                    </div>
                </div>

                <div class="timer-zone">
                    <div id="timer" onclick="toggleTimer()">20:00</div>
                </div>

                <div class="ctrl-bar">
                    <button class="ctrl-btn" onclick="prevLevel()">◀ 上一级</button>
                    <button class="ctrl-btn primary" id="startBtn" onclick="toggleTimer()">开始比赛</button>
                    <button class="ctrl-btn" onclick="resetTimer()">重置</button>
                    <button class="ctrl-btn" onclick="nextLevel()">下一级 ▶</button>
                </div>
            </div>
        </section>

        <section class="panel">
            <h2 class="panel-title">赛事数据看板</h2>
            <div class="stats-grid">
                
                <div class="stat-card">
                    <span class="stat-label">总奖池 (Prize Pot)</span>
                    <span class="stat-value gold" id="potDisplay">￥0</span>
                </div>

                <div class="stat-card">
                    <span class="stat-label">剩余选手 / 总买入</span>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span class="stat-value blue" id="playersDisplay">0 / 0</span>
                        <div class="stat-controls">
                            <button class="sub-btn" onclick="adjustPlayers(-1)">-</button>
                            <button class="sub-btn" onclick="adjustPlayers(1)">+</button>
                        </div>
                    </div>
                </div>

                <div class="stat-card">
                    <span class="stat-label">总筹码量 (Total Chips)</span>
                    <span class="stat-value">0</span>
                </div>

                <div class="stat-card">
                    <span class="stat-label">平均筹码 (Avg Chips)</span>
                    <span class="stat-value" id="avgChipsDisplay">0</span>
                </div>

            </div>
        </section>
    </main>

    <script>
        // 专业的经典盲注结构配置
        const blindStructure = [
            { level: 1, small: 100, big: 200, ante: 200, time: 1200 },
            { level: 2, small: 200, big: 400, ante: 400, time: 1200 },
            { level: 3, small: 300, big: 600, ante: 600, time: 1200 },
            { level: 4, small: 400, big: 800, ante: 800, time: 1200 },
            { level: 5, small: 500, big: 1000, ante: 1000, time: 1200 },
            { level: 6, small: 600, big: 1200, ante: 1200, time: 1200 },
            { level: 7, small: 800, big: 1600, ante: 1600, time: 1200 },
            { level: 8, small: 1000, big: 2000, ante: 2000, time: 1200 }
        ];

        let currentLevelIndex = 0;
        let timeLeft = blindStructure[0].time;
        let timerId = null;

        // 赛事基础数据
        let playersRemaining = 9;
        let totalEntries = 9;
        const buyInAmount = 500; // 单次买入金额
        const startingChips = 20000; // 初始筹码

        // 初始化渲染
        function init() {
            renderLevelList();
            updateDisplay();
            updateStats();
        }

        // 渲染左侧盲注列表
        function renderLevelList() {
            const listEl = document.getElementById('levelList');
            listEl.innerHTML = blindStructure.map((item, index) => `
                <div class="level-item ${index === currentLevelIndex ? 'active' : ''}" onclick="selectLevel(${index})">
                    <span class="lvl-num">L${item.level}</span>
                    <span class="lvl-blinds">${item.small}/${item.big} (A:${item.ante})</span>
                    <span class="lvl-time">${item.time / 60}m</span>
                </div>
            `).join('');
        }

        // 更新中央大屏显示
        function updateDisplay() {
            const current = blindStructure[currentLevelIndex];
            const next = blindStructure[currentLevelIndex + 1] || { small: '-', big: '-', ante: '-' };

            document.getElementById('currentLevelNum').innerText = current.level;
            document.getElementById('currentBlindsDisplay').innerText = `${current.small} / ${current.big}`;
            document.getElementById('currentAnteDisplay').innerText = current.ante;
            
            if (next.small === '-') {
                document.getElementById('nextBlindsDisplay').innerText = 'Final Level';
            } else {
                document.getElementById('nextBlindsDisplay').innerText = `${next.small} / ${next.big}`;
            }

            // 格式化时间
            const mins = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const secs = (timeLeft % 60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${mins}:${secs}`;
        }

        // 更新右侧看板数据
        function updateStats() {
            const totalChips = totalEntries * startingChips;
            const avgChips = playersRemaining > 0 ? Math.round(totalChips / playersRemaining) : 0;
            const totalPrize = totalEntries * buyInAmount;

            document.getElementById('potDisplay').innerText = `￥${totalPrize.toLocaleString()}`;
            document.getElementById('playersDisplay').innerText = `${playersRemaining} / ${totalEntries}`;
            document.getElementById('avgChipsDisplay').innerText = avgChips.toLocaleString();
            
            // 顺手更新一下第三张卡片的总筹码量
            document.querySelectorAll('.stat-value')[2].innerText = totalChips.toLocaleString();
        }

        // 计时器开关
        function toggleTimer() {
            if (timerId) {
                clearInterval(timerId);
                timerId = null;
                document.getElementById('startBtn').innerText = '恢复比赛';
                document.getElementById('startBtn').classList.add('primary');
            } else {
                document.getElementById('startBtn').innerText = '暂停';
                document.getElementById('startBtn').classList.remove('primary');
                timerId = setInterval(() => {
                    if (timeLeft > 0) {
                        timeLeft--;
                        updateDisplay();
                    } else {
                        // 升盲逻辑
                        if (currentLevelIndex < blindStructure.length - 1) {
                            currentLevelIndex++;
                            timeLeft = blindStructure[currentLevelIndex].time;
                            renderLevelList();
                            updateDisplay();
                            // 播放升盲提示音（可选）
                        } else {
                            clearInterval(timerId);
                            timerId = null;
                            alert('所有盲注级别已结束！');
                        }
                    }
                }, 1000);
            }
        }

        function resetTimer() {
            clearInterval(timerId);
            timerId = null;
            timeLeft = blindStructure[currentLevelIndex].time;
            document.getElementById('startBtn').innerText = '开始比赛';
            document.getElementById('startBtn').classList.add('primary');
            updateDisplay();
        }

        function nextLevel() {
            if (currentLevelIndex < blindStructure.length - 1) {
                currentLevelIndex++;
                timeLeft = blindStructure[currentLevelIndex].time;
                renderLevelList();
                updateDisplay();
            }
        }

        function prevLevel() {
            if (currentLevelIndex > 0) {
                currentLevelIndex--;
                timeLeft = blindStructure[currentLevelIndex].time;
                renderLevelList();
                updateDisplay();
            }
        }

        function selectLevel(index) {
            currentLevelIndex = index;
            timeLeft = blindStructure[index].time;
            renderLevelList();
            updateDisplay();
        }

        // 选手数据调整
        function adjustPlayers(change) {
            if (change > 0) {
                // 增加新买入
                totalEntries++;
                playersRemaining++;
            } else {
                // 淘汰选手
                if (playersRemaining > 1) {
                    playersRemaining--;
                }
            }
            updateStats();
        }

        // 启动项目
        init();
    </script>
</body>
</html>
